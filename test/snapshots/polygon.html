<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.12.2/distrib/jsxgraph.css" />
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsxgraph@1.12.2/distrib/jsxgraphcore.js"></script>
<div id="snap_polygon" class="jxgbox" style="width:500px;height:500px"></div>
<script>
var board_snap_polygon = JXG.JSXGraph.initBoard('snap_polygon', {"showNavigation":false,"showCopyright":false,"axis":true,"boundingbox":[-5,5,5,-5]});
var el_001 = board_snap_polygon.create('point', [0,0], {"name":"A"});
var el_002 = board_snap_polygon.create('point', [4,0], {"name":"B"});
var el_003 = board_snap_polygon.create('point', [2,3], {"name":"C"});
var el_004 = board_snap_polygon.create('polygon', [el_001,el_002,el_003], {"fillColor":"yellow","fillOpacity":0.3});
</script>
